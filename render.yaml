services:
  - type: web
    name: vehicle-management
    runtime: docker
    plan: standard
    healthCheckPath: /
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stack
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: cookie
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: serverless-eu-central-1.sysp0000.db1.skysql.com
      - key: DB_PORT
        value: "4013"
      - key: DB_USERNAME
        value: dbpwf11756350
      - key: DB_PASSWORD
        value: McsBZ7fk7tZP[(nEz5XCVK0
      - key: APP_URL
        value: https://scpamotorpool.onrender.com
databases:
